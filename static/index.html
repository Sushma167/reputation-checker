<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNSBL Intelligence Center</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="bg-animation"></div>

<header>

    <h1>🛡 DNSBL Intelligence Center</h1>

    <p>
        Real-Time DNS • SPF • DMARC • MX • DNSBL Intelligence
    </p>

    <button onclick="toggleTheme()" class="theme-btn">
        Toggle Theme
    </button>

</header>

<div class="container">

    <section class="card">

        <h2>🌐 Domain Intelligence</h2>

        <input
            id="domainInput"
            placeholder="google.com">

        <button onclick="checkDomain()">
            Analyze Domain
        </button>

        <div id="domainResult"></div>

    </section>

    <section class="card">

        <h2>🛡 Single IP Intelligence</h2>

        <input
            id="ipInput"
            placeholder="8.8.8.8">

        <button onclick="checkIP()">
            Analyze IP
        </button>

        <div id="ipResult"></div>

    </section>

    <section class="card">

        <h2>⚡ Bulk IP Intelligence</h2>

        <input
            id="bulkInput"
            placeholder="45.205.67.0/24">

        <button onclick="checkBulk()">
            Scan Range
        </button>

        <div id="bulkResult"></div>

    </section>

</div>

<footer>

    <h3>About DNSBL Intelligence Center</h3>

    <p>
        Real-time SPF, DMARC, MX and DNSBL reputation intelligence.
    </p>

    <p>
        Sources: Spamhaus • Spamcop • Barracuda
    </p>

</footer>

<script src="/static/app.js"></script>

</body>
</html>
